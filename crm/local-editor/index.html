<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TC CRM</title>
    <link rel="stylesheet" href="styles.css?v=20260718-edit-lock" />
    <script type="module" src="app.js?v=20260718-edit-lock"></script>
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="CRM controls">
        <div>
          <p class="eyebrow">Private CRM</p>
          <h1>Relationship records</h1>
        </div>

        <button class="primary-action" id="open-folder" type="button">
          Choose iCloud folder
        </button>
        <button id="new-record" type="button">New record</button>
        <button id="save-record" type="button" disabled>Save changes</button>

        <div class="status-panel">
          <p>Source</p>
          <strong id="folder-status">No folder selected</strong>
        </div>
      </aside>

      <section class="workspace">
        <header class="toolbar">
          <label>
            Search
            <input id="search" type="search" autocomplete="off" />
          </label>
          <button id="add-field" type="button" disabled>Add field</button>
        </header>

        <section class="table-wrap" aria-label="CRM records">
          <table>
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
          </table>
        </section>

        <section class="editor" id="editor" aria-label="Record editor" hidden>
          <div class="editor-head">
            <div>
              <p class="eyebrow">Selected record</p>
              <h2 id="editor-title">Untitled</h2>
            </div>
            <p id="record-id"></p>
          </div>

          <form id="record-form"></form>

          <div class="custom-fields">
            <h3>Dynamic fields</h3>
            <div id="custom-form"></div>
          </div>
        </section>
      </section>
    </main>

    <template id="empty-state">
      <tr>
        <td colspan="12">
          <div class="empty-state">
            <p>No records loaded.</p>
            <span>Choose your iCloud CRM folder or create a new record.</span>
          </div>
        </td>
      </tr>
    </template>
  </body>
</html>
