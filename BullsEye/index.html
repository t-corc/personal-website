<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BullsEye | EagleEye Job Hunter</title>
    <meta
      name="description"
      content="EagleEye / Job Hunter local build roadmap and Codex setup."
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #111827;
        --muted: #5b6472;
        --line: #d9e2ec;
        --bg: #f7fafc;
        --panel: #ffffff;
        --accent: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(32px, 5vw, 56px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
      }

      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
      }

      .frame {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 50px rgba(17, 24, 39, 0.08);
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }

      .actions {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      @media (max-width: 760px) {
        header {
          display: block;
        }

        header a {
          display: inline-block;
          margin-top: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>BullsEye</h1>
          <p>EagleEye / Job Hunter roadmap and Codex setup.</p>
        </div>
        <a href="/">Back to tommasocorciulo.com</a>
      </header>

      <section class="frame" aria-label="EagleEye roadmap image">
        <img
          src="./assets/eagleeye-roadmap.png"
          alt="EagleEye Job Hunter roadmap and Codex setup diagram"
        />
      </section>

      <div class="actions">
        <a href="./assets/eagleeye-roadmap.png">Open image</a>
      </div>
    </main>
  </body>
</html>
